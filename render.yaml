services:
  # ─── Laravel Backend (Docker) ─────────────────────────────────
  - type: web
    name: eliteplatform-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_NAME
        value: ElitePlatform
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        sync: false          # set manually in Render dashboard
      - key: APP_URL
        sync: false          # set after deploy: https://eliteplatform-api.onrender.com
      - key: FRONTEND_URL
        sync: false          # set after Vercel deploy
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        value: sql.freedb.tech
      - key: DB_PORT
        value: 3306
      - key: DB_DATABASE
        value: freedb_elitePlatform
      - key: DB_USERNAME
        value: freedb_asswadi
      - key: DB_PASSWORD
        sync: false          # set manually: 4@bg7a%Z&7U&xjV
      - key: SESSION_DRIVER
        value: cookie
      - key: SESSION_LIFETIME
        value: 120
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: SANCTUM_STATEFUL_DOMAINS
        sync: false          # set after Vercel deploy: your-app.vercel.app
      - key: CLOUDINARY_URL
        sync: false          # cloudinary://API_KEY:API_SECRET@do9oyija9
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: 587
      - key: MAIL_USERNAME
        value: asswadi.edu@gmail.com
      - key: MAIL_PASSWORD
        sync: false          # your Gmail App Password
      - key: MAIL_ENCRYPTION
        value: tls
      - key: MAIL_FROM_ADDRESS
        value: asswadi.edu@gmail.com
      - key: MAIL_FROM_NAME
        value: ElitePlatform
      - key: PYTHON_API_URL
        sync: false          # set after Python service deploys

  # ─── Python FastAPI ────────────────────────────────────────────
  - type: web
    name: eliteplatform-python
    runtime: python
    rootDir: python-api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
